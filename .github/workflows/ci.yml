name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Fake Azure credentials — unit tests use lazy clients and never contact Azure
  AI_FOUNDRY_PROJECT_ENDPOINT: "https://ci-test.openai.azure.com"
  AZURE_OPENAI_PRIMARY_DEPLOYMENT: "gpt-4o"
  AZURE_OPENAI_FAST_DEPLOYMENT: "gpt-4o-mini"
  AI_FOUNDRY_API_KEY: "ci-test-key-000000000000"
  AI_FOUNDRY_API_VERSION: "2024-12-01-preview"
  TRACKING_MCP_PORT: "8100"
  DS_TOOLS_MCP_PORT: "8101"
  BUG_LOG_MCP_PORT: "8102"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.9.0

      - name: Lint
        run: ruff check --output-format=github .

      - name: Format check
        run: ruff format --check --diff .
        continue-on-error: true   # formatting is advisory, not blocking

  # ── Unit tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install a lightweight subset of deps sufficient for import tests.
      # Heavy ML libs (torch, catboost, etc.) are skipped in CI to keep
      # build times reasonable. The full install is done in the integration job.
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            agent-framework-openai \
            fastmcp \
            fastapi \
            uvicorn \
            httpx \
            python-dotenv \
            pydantic-settings \
            duckduckgo-search \
            filetype \
            chardet \
            pandas \
            numpy \
            scikit-learn \
            rich \
            pytest \
            pytest-asyncio \
            pytest-cov \
            aiofiles \
            tenacity

      - name: Create required directories
        run: |
          mkdir -p data/artefacts data/tracking logs memory

      - name: Run unit tests
        run: |
          python -m pytest tests/test_imports.py \
            -v \
            --tb=short \
            --junitxml=junit/unit-results.xml \
            --cov=agents --cov=workflows --cov=tools --cov=config \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: junit/unit-results.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # ── Integration tests ───────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (MCP servers)
    runs-on: ubuntu-latest
    needs: unit-tests   # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            agent-framework-openai \
            fastmcp \
            fastapi \
            uvicorn \
            httpx \
            python-dotenv \
            pydantic-settings \
            duckduckgo-search \
            filetype \
            chardet \
            pandas \
            numpy \
            scikit-learn \
            rich \
            pytest \
            pytest-asyncio \
            aiofiles \
            tenacity

      - name: Create required directories
        run: mkdir -p data/artefacts data/tracking logs memory

      - name: Start MCP servers (background)
        run: |
          python -m uvicorn mcp_servers.tracking.server:app --host 0.0.0.0 --port 8100 &
          python -m uvicorn mcp_servers.ds_tools.server:app --host 0.0.0.0 --port 8101 &
          python -m uvicorn mcp_servers.bug_log.server:app  --host 0.0.0.0 --port 8102 &
        env:
          TRACKING_DB_PATH: data/tracking.db
          BUG_LOG_DB_PATH: data/bug_log.db

      - name: Wait for servers to be ready
        run: |
          python -c "
          import time, urllib.request, sys
          ports = [8100, 8101, 8102]
          deadline = time.time() + 30
          while time.time() < deadline:
              ok = True
              for p in ports:
                  try:
                      urllib.request.urlopen(f'http://localhost:{p}/health', timeout=2)
                  except Exception:
                      ok = False
              if ok:
                  print('All servers healthy')
                  sys.exit(0)
              time.sleep(1)
          print('Servers not ready after 30s', file=sys.stderr)
          sys.exit(1)
          "

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py \
            -v \
            --tb=short \
            --junitxml=junit/integration-results.xml
        env:
          TRACKING_DB_PATH: data/tracking.db
          BUG_LOG_DB_PATH: data/bug_log.db

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: junit/integration-results.xml
